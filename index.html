<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almanac · Calendar</title>
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/components.css">
  <style>
    .day-popover {
      position: absolute;
      z-index: 100;
      min-width: 200px;
      max-width: 280px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      padding: 10px 12px;
      font-size: 0.8rem;
    }
    .day-popover-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--ink);
      font-size: 0.85rem;
    }
    .day-popover-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 2px;
      line-height: 1;
    }
    .day-popover-close:hover { color: var(--ink); }
    .day-popover-item {
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      margin-bottom: 3px;
      cursor: pointer;
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .day-popover-item:hover { filter: brightness(1.2); }
    .cal-more-link {
      font-size: 0.65rem;
      color: var(--muted);
      padding: 1px 4px;
      cursor: pointer;
    }
    .cal-more-link:hover { color: var(--ink); text-decoration: underline; }
    .cal-meal-label {
      font-size: 0.6rem;
      color: var(--accent);
      opacity: 0.8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 2px;
      line-height: 1.4;
      cursor: default;
    }
  </style></head>
<body>
  <div class="header">
    <div class="brand">Almanac</div>
    <nav class="nav">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="calendar.html" class="nav-link active">Calendar</a>
      <a href="horizon.html" class="nav-link">Horizon</a>
      <a href="backlog.html" class="nav-link">Backlog</a>
      <button class="btn-theme" onclick="toggleTheme()">◑</button>
    </nav>
  </div>
  <div class="container" id="app">
    <div class="loading-state">Loading calendar...</div>
  </div>

  <!-- Event Modal -->
  <div class="modal-overlay" id="event-modal">
    <div class="modal">
      <div class="modal-title">
        <span id="modal-title-text">New Event</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" class="form-input" id="evt-title" placeholder="Event name...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Start Date</label>
            <input type="date" class="form-input" id="evt-date">
          </div>
          <div class="form-group">
            <label class="form-label">End Date <span style="font-weight:400;text-transform:none">(optional)</span></label>
            <input type="date" class="form-input" id="evt-end-date" placeholder="Same day">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="evt-category"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Time</label>
            <select class="form-select" id="evt-time">
              <option value="">None</option>
              <option value="morning">Morning</option>
              <option value="afternoon">Afternoon</option>
              <option value="evening">Evening</option>
              <option value="all-day">All Day</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select class="form-select" id="evt-priority">
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Repeats</label>
            <select class="form-select" id="evt-recurs" onchange="toggleRecurEnd()">
              <option value="">Never</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="annual">Annually</option>
            </select>
          </div>
          <div class="form-group" id="recur-end-group" style="display:none">
            <label class="form-label">Until (optional)</label>
            <input type="date" class="form-input" id="evt-recur-end">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" id="evt-notes" rows="2" placeholder="Optional notes..."></textarea>
        </div>
        <div class="form-actions">
          <button class="btn" id="btn-delete-event" onclick="deleteEvent()" style="display:none">Delete</button>
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn--primary" onclick="saveEvent()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/components.js"></script>
  <script>
    let currentYear, currentMonth;
    let editingEventId = null;
    let dragStart = null;
    let dragEnd = null;
    let isDragging = false;
    let overlayEvents = []; // Multi-day event data for post-render overlay positioning
    let calMeals = {}; // dateStr → { title } lookup for meal indicators

    // ---- MEAL DATA FOR CALENDAR ----
    async function loadMealsForMonth(year, month) {
      calMeals = {};
      try {
        const res = await fetch('/api/meals/weeks');
        const data = await res.json();
        const weeks = data.weeks || [];
        if (weeks.length === 0) return;

        // Find weeks that overlap this month
        const monthStart = `${year}-${String(month).padStart(2, '0')}-01`;
        const daysInMonth = new Date(year, month, 0).getDate();
        const monthEnd = `${year}-${String(month).padStart(2, '0')}-${String(daysInMonth).padStart(2, '0')}`;

        const dayNames = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

        for (const week of weeks) {
          try {
            const weekStart = week.startDate || week.id;
            if (!weekStart || !/^\d{4}-\d{2}-\d{2}$/.test(weekStart)) continue;

            // Week covers 7 days: weekStart through weekStart+6
            const ws = new Date(weekStart + 'T12:00:00');
            if (isNaN(ws.getTime())) continue;

            const weekEndDate = new Date(ws);
            weekEndDate.setDate(ws.getDate() + 6);
            const weekEnd = weekEndDate.toISOString().slice(0, 10);

            // Skip weeks that don't overlap this month
            if (weekEnd < monthStart || weekStart > monthEnd) continue;

            // Fetch this week's plan
            const planRes = await fetch(`/api/meals/${week.id}`);
            const planData = await planRes.json();
            const plan = planData.plan;
            if (!plan || !plan.meals) continue;

            // Map each day to its date string
            for (let d = 0; d < 7; d++) {
              const dayDate = new Date(ws);
              dayDate.setDate(ws.getDate() + d);
              const dateStr = dayDate.toISOString().slice(0, 10);
              if (dateStr < monthStart || dateStr > monthEnd) continue;

              const dayKey = dayNames[dayDate.getDay()];
              const meal = plan.meals[dayKey];
              if (meal && meal.title) {
                calMeals[dateStr] = { title: meal.title };
              }
            }
          } catch (weekErr) {
            console.warn('Skipping week:', week.id, weekErr.message);
          }
        }
      } catch (err) {
        console.warn('Calendar meal load skipped:', err.message);
      }
    }

    function initTheme() {
      if (localStorage.getItem('almanac-theme') === 'light') document.body.classList.add('light');
    }
    function toggleTheme() {
      document.body.classList.toggle('light');
      localStorage.setItem('almanac-theme', document.body.classList.contains('light') ? 'light' : 'dark');
    }
    initTheme();

    function initMonth() {
      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth() + 1;
    }

    function shiftMonth(offset) {
      currentMonth += offset;
      if (currentMonth > 12) { currentMonth = 1; currentYear++; }
      if (currentMonth < 1) { currentMonth = 12; currentYear--; }
      renderPage();
      loadMealsForMonth(currentYear, currentMonth).then(() => renderPage());
    }

    function goThisMonth() {
      initMonth();
      renderPage();
      loadMealsForMonth(currentYear, currentMonth).then(() => renderPage());
    }

    // ---- MODAL (same as dashboard) ----
    function openModal(event, defaultDate, defaultEndDate) {
      editingEventId = event ? event.id : null;
      document.getElementById('modal-title-text').textContent = event ? 'Edit Event' : 'New Event';
      document.getElementById('btn-delete-event').style.display = event ? '' : 'none';

      const catSelect = document.getElementById('evt-category');
      catSelect.innerHTML = '';
      for (const key of Object.keys(Store.data.categories)) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = Store.data.categories[key].label;
        catSelect.appendChild(opt);
      }

      if (event) {
        document.getElementById('evt-title').value = event.title;
        document.getElementById('evt-date').value = event.date;
        document.getElementById('evt-end-date').value = event.endDate || '';
        document.getElementById('evt-category').value = event.category;
        document.getElementById('evt-time').value = event.time || '';
        document.getElementById('evt-priority').value = event.priority || 'normal';
        document.getElementById('evt-recurs').value = event.recurs || '';
        document.getElementById('evt-recur-end').value = event.recurEnd || '';
        document.getElementById('evt-notes').value = event.notes || '';
      } else {
        document.getElementById('evt-title').value = '';
        document.getElementById('evt-date').value = defaultDate || Utils.getTodayISO();
        document.getElementById('evt-end-date').value = defaultEndDate || '';
        document.getElementById('evt-category').value = 'family';
        document.getElementById('evt-time').value = '';
        document.getElementById('evt-priority').value = 'normal';
        document.getElementById('evt-recurs').value = '';
        document.getElementById('evt-recur-end').value = '';
        document.getElementById('evt-notes').value = '';
      }
      toggleRecurEnd();

      document.getElementById('event-modal').classList.add('visible');
      document.getElementById('evt-title').focus();
    }

    function closeModal() {
      document.getElementById('event-modal').classList.remove('visible');
      editingEventId = null;
    }

    function toggleRecurEnd() {
      const val = document.getElementById('evt-recurs').value;
      document.getElementById('recur-end-group').style.display = val ? '' : 'none';
    }

    function saveEvent() {
      const title = document.getElementById('evt-title').value.trim();
      const date = document.getElementById('evt-date').value;
      if (!title || !date) return;

      const recurs = document.getElementById('evt-recurs').value || null;
      const recurEnd = document.getElementById('evt-recur-end').value || null;
      const endDateVal = document.getElementById('evt-end-date').value || null;
      // Only set endDate if it's different from start date
      const endDate = (endDateVal && endDateVal !== date) ? endDateVal : null;

      const eventData = {
        id: editingEventId || Utils.makeId(title),
        title, date,
        endDate,
        category: document.getElementById('evt-category').value,
        priority: document.getElementById('evt-priority').value,
        time: document.getElementById('evt-time').value || null,
        recurs,
        recurEnd,
        leadWeeks: 2,
        notes: document.getElementById('evt-notes').value.trim(),
        tasks: []
      };

      if (editingEventId) {
        const existing = Store.data.events.find(e => e.id === editingEventId);
        if (existing) eventData.tasks = existing.tasks || [];
        Store.removeEvent(editingEventId);
      }
      Store.addEvent(eventData);
      closeModal();
      renderPage();
    }

    function deleteEvent() {
      if (editingEventId && confirm('Delete this event?')) {
        Store.removeEvent(editingEventId);
        closeModal();
        renderPage();
      }
    }

    function handleEventClick(eventId) {
      const event = Store.data.events.find(e => e.id === eventId);
      if (event) openModal(event);
    }

    function handleCellClick(dateStr) {
      // Only used as fallback for single clicks without drag
      openModal(null, dateStr);
    }

    // ---- DRAG-TO-SELECT ----

    function handleDragStart(dateStr, e) {
      if (e.button !== undefined && e.button !== 0) return; // left click only
      // Don't start drag on interactive child elements
      const target = e.target || e.srcElement;
      if (target.closest('.cal-more-link') || target.closest('.cal-event-label') || target.closest('.cal-span-overlay') || target.closest('.cal-meal-label')) return;
      e.preventDefault();
      isDragging = true;
      dragStart = dateStr;
      dragEnd = dateStr;
      updateDragSelection();
      const grid = document.querySelector('.cal-grid');
      if (grid) grid.classList.add('dragging');
    }

    function handleDragOver(dateStr) {
      if (!isDragging) return;
      dragEnd = dateStr;
      updateDragSelection();
    }

    function handleDragEnd() {
      if (!isDragging) return;
      isDragging = false;
      const grid = document.querySelector('.cal-grid');
      if (grid) grid.classList.remove('dragging');
      clearDragSelection();

      if (!dragStart) return;
      // Ensure start <= end
      let start = dragStart;
      let end = dragEnd || dragStart;
      if (start > end) { const tmp = start; start = end; end = tmp; }

      if (start === end) {
        openModal(null, start);
      } else {
        openModal(null, start, end);
      }
      dragStart = null;
      dragEnd = null;
    }

    function updateDragSelection() {
      // Clear previous selection
      document.querySelectorAll('.cal-cell.drag-selected').forEach(el => el.classList.remove('drag-selected'));
      if (!dragStart || !dragEnd) return;

      let start = dragStart;
      let end = dragEnd;
      if (start > end) { const tmp = start; start = end; end = tmp; }

      document.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
        const d = cell.getAttribute('data-date');
        if (d >= start && d <= end) {
          cell.classList.add('drag-selected');
        }
      });
    }

    function clearDragSelection() {
      document.querySelectorAll('.cal-cell.drag-selected').forEach(el => el.classList.remove('drag-selected'));
    }

    // Global mouseup to catch drag-end even outside the grid
    document.addEventListener('mouseup', handleDragEnd);
    document.addEventListener('touchend', handleDragEnd);

    // ---- DAY POPOVER (for "+N more") ----

    function closeDayPopover() {
      const existing = document.querySelector('.day-popover');
      if (existing) existing.remove();
    }

    function showDayPopover(dateStr, clickEvent) {
      closeDayPopover();

      const allEvents = Store.getEventsForDate(dateStr);
      if (allEvents.length === 0) return;

      const popover = document.createElement('div');
      popover.className = 'day-popover';

      const dayLabel = Utils.formatDateFull(dateStr);
      let inner = `<div class="day-popover-header"><span>${dayLabel}</span><button class="day-popover-close" onclick="closeDayPopover()">✕</button></div>`;

      for (const evt of allEvents) {
        const style = Store.getCategoryStyle(evt.category);
        const evtId = evt._templateId || evt.id;
        inner += `<div class="day-popover-item" style="background:${style.bg};color:${style.color}" onclick="closeDayPopover();handleEventClick('${evtId}')">${evt.title}</div>`;
      }

      popover.innerHTML = inner;

      // Position near the clicked element
      const cell = clickEvent.target.closest('.cal-cell');
      const grid = document.querySelector('.cal-grid');
      if (cell && grid) {
        grid.style.position = 'relative';
        const cellRect = cell.getBoundingClientRect();
        const gridRect = grid.getBoundingClientRect();
        let left = cellRect.left - gridRect.left;
        let top = cellRect.bottom - gridRect.top + 4;

        // Keep popover within grid bounds
        grid.appendChild(popover);
        const popRect = popover.getBoundingClientRect();
        if (popRect.right > gridRect.right) {
          left = Math.max(0, left - (popRect.right - gridRect.right) - 8);
        }
        if (popRect.bottom > window.innerHeight) {
          top = cellRect.top - gridRect.top - popRect.height - 4;
        }
        popover.style.left = left + 'px';
        popover.style.top = top + 'px';
      } else {
        document.body.appendChild(popover);
      }
    }

    // Dismiss popover on click outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.day-popover') && !e.target.closest('.cal-more-link')) {
        closeDayPopover();
      }
    });

    // ---- RENDER ----
    function renderPage() {
      const monthName = Utils.getMonthName(currentYear, currentMonth);
      const events = Store.getEventsForMonth(currentYear, currentMonth);
      const todayISO = Utils.getTodayISO();
      const now = new Date();
      const isThisMonth = currentYear === now.getFullYear() && currentMonth === now.getMonth() + 1;

      const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      let html = '';

      // Header
      html += `<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
        <div class="page-title">${monthName}</div>
        <div class="week-nav">
          <button class="btn" onclick="shiftMonth(-1)">‹</button>
          ${!isThisMonth ? '<button class="btn-today" onclick="goThisMonth()">This Month</button>' : ''}
          <button class="btn" onclick="shiftMonth(1)">›</button>
        </div>
      </div>`;

      // Calendar grid
      html += '<div class="cal-grid">';
      for (const d of dayNames) {
        html += `<div class="cal-header">${d}</div>`;
      }

      // ---- SLOT ALLOCATION for multi-day events ----
      // Separate multi-day vs single-day events
      const multiDayEvents = events.filter(e => e.endDate && e.endDate !== e.date);
      const singleDayEvents = events.filter(e => !e.endDate || e.endDate === e.date);

      // Sort multi-day: earlier start first, then longer events first
      multiDayEvents.sort((a, b) => {
        if (a.date !== b.date) return a.date.localeCompare(b.date);
        const aDur = (new Date(a.endDate) - new Date(a.date));
        const bDur = (new Date(b.endDate) - new Date(b.date));
        return bDur - aDur; // longer first
      });

      // Build date strings for the month
      const monthDates = [];
      for (let d = 1; d <= daysInMonth; d++) {
        monthDates.push(`${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`);
      }

      // slotMap[dateStr] = { 0: event, 1: event, ... }
      const slotMap = {};
      for (const ds of monthDates) slotMap[ds] = {};

      // Assign each multi-day event a consistent slot
      for (const evt of multiDayEvents) {
        // Get the dates this event covers within this month
        const coveredDates = monthDates.filter(ds => ds >= evt.date && ds <= evt.endDate);
        if (coveredDates.length === 0) continue;

        // Find the lowest slot that's free across ALL covered dates
        let slot = 0;
        while (true) {
          const free = coveredDates.every(ds => !slotMap[ds][slot]);
          if (free) break;
          slot++;
        }

        // Reserve this slot on all covered dates
        for (const ds of coveredDates) {
          slotMap[ds][slot] = evt;
        }
      }

      // Build single-day lookup: dateStr → [events]
      const singleMap = {};
      for (const evt of singleDayEvents) {
        if (!singleMap[evt.date]) singleMap[evt.date] = [];
        singleMap[evt.date].push(evt);
      }

      // Collect overlay data for multi-day events (deduplicated)
      overlayEvents = [];
      const seenOverlay = new Set();
      for (const evt of multiDayEvents) {
        const key = evt._templateId || evt.id;
        if (seenOverlay.has(key)) continue;
        seenOverlay.add(key);
        // Find slot for this event
        const firstCovered = monthDates.find(ds => ds >= evt.date && ds <= evt.endDate);
        if (!firstCovered) continue;
        const slot = Object.keys(slotMap[firstCovered]).find(s => {
          const e = slotMap[firstCovered][s];
          return e && (e._templateId || e.id) === key;
        });
        if (slot !== undefined) {
          overlayEvents.push({ evt, slot: parseInt(slot) });
        }
      }

      // Empty cells before first day
      for (let i = 0; i < firstDay; i++) {
        html += '<div class="cal-cell empty"></div>';
      }

      // Day cells
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = monthDates[d - 1];
        const isToday = dateStr === todayISO ? ' today' : '';
        const slots = slotMap[dateStr];
        const singles = singleMap[dateStr] || [];

        // Find max slot index for this date
        const slotKeys = Object.keys(slots).map(Number);
        const maxSlot = slotKeys.length > 0 ? Math.max(...slotKeys) : -1;

        let cellContent = `<div class="cal-day-num">${d}</div>`;

        // Render invisible placeholders for multi-day slots (reserves vertical space)
        for (let s = 0; s <= maxSlot; s++) {
          cellContent += `<div class="cal-event-placeholder">&nbsp;</div>`;
        }

        // Render single-day events below the slots
        for (const evt of singles.slice(0, Math.max(0, 3 - maxSlot - 1))) {
          const style = Store.getCategoryStyle(evt.category);
          cellContent += `<div class="cal-event-label" style="background:${style.bg};color:${style.color}" onclick="event.stopPropagation();handleEventClick('${evt._templateId || evt.id}')">${evt.title}</div>`;
        }

        const totalVisible = (maxSlot + 1) + singles.length;
        if (totalVisible > 3) {
          cellContent += `<div class="cal-more-link" onclick="event.stopPropagation();showDayPopover('${dateStr}', event)">+${totalVisible - 3} more</div>`;
        }

        // Meal indicator
        const meal = calMeals[dateStr];
        if (meal) {
          cellContent += `<div class="cal-meal-label">🍽 ${meal.title}</div>`;
        }

        html += `<div class="cal-cell${isToday}" data-date="${dateStr}"
          onmousedown="handleDragStart('${dateStr}', event)"
          onmouseover="handleDragOver('${dateStr}')"
          ontouchstart="handleDragStart('${dateStr}', event)"
          ontouchmove="(function(e){ var t = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY); if(t) { var cell = t.closest('[data-date]'); if(cell) handleDragOver(cell.getAttribute('data-date')); } })(event)"
          >${cellContent}</div>`;
      }

      html += '</div>';

      // Event list below calendar
      if (events.length > 0) {
        html += '<div class="card" style="margin-top:20px">';
        html += `<div class="card-header">
          <span class="card-title">Events in ${monthName}</span>
          <button class="btn btn--sm" onclick="openModal()">+ Event</button>
        </div>`;
        html += '<div class="stack-sm">';
        for (const e of events) {
          html += Comp.eventItem(e, { showDate: true, hideTasks: true });
        }
        html += '</div></div>';
      }

      document.getElementById('app').innerHTML = html;
      requestAnimationFrame(() => renderMultiDayOverlays());
    }

    // ---- MULTI-DAY OVERLAY BARS ----
    function renderMultiDayOverlays() {
      document.querySelectorAll('.cal-span-overlay').forEach(el => el.remove());
      const grid = document.querySelector('.cal-grid');
      if (!grid || overlayEvents.length === 0) return;

      const gridRect = grid.getBoundingClientRect();

      for (const { evt, slot } of overlayEvents) {
        const startDate = evt.date;
        const endDate = evt.endDate;

        // Find all cells this event covers
        const cells = [];
        grid.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
          const d = cell.getAttribute('data-date');
          if (d >= startDate && d <= endDate) {
            cells.push({ date: d, el: cell });
          }
        });
        if (cells.length === 0) continue;

        // Group cells by visual row (same top = same week)
        const rowGroups = [];
        let currentGroup = [cells[0]];
        for (let i = 1; i < cells.length; i++) {
          const prevTop = cells[i - 1].el.getBoundingClientRect().top;
          const thisTop = cells[i].el.getBoundingClientRect().top;
          if (Math.abs(thisTop - prevTop) < 5) {
            currentGroup.push(cells[i]);
          } else {
            rowGroups.push(currentGroup);
            currentGroup = [cells[i]];
          }
        }
        rowGroups.push(currentGroup);

        const style = Store.getCategoryStyle(evt.category);

        for (const group of rowGroups) {
          const firstEl = group[0].el;
          const lastEl = group[group.length - 1].el;
          const firstRect = firstEl.getBoundingClientRect();
          const lastRect = lastEl.getBoundingClientRect();

          const isEventStart = group[0].date === startDate;
          const isEventEnd = group[group.length - 1].date === endDate;

          // Position relative to grid container
          const inset = 3; // small inset from cell edges for rounding
          const left = firstRect.left - gridRect.left + (isEventStart ? inset : 0);
          const right = lastRect.right - gridRect.left - (isEventEnd ? inset : 0);
          const barWidth = right - left;

          // Vertical: day-num height (~22px) + slot offset
          const slotHeight = 16;
          const dayNumHeight = 22;
          const top = (firstRect.top - gridRect.top) + dayNumHeight + (slot * slotHeight);

          const bar = document.createElement('div');
          bar.className = 'cal-span-overlay';
          bar.style.cssText = `
            left: ${left}px;
            top: ${top}px;
            width: ${barWidth}px;
            background: ${style.bg};
            color: ${style.color};
            border-radius: ${isEventStart ? 3 : 0}px ${isEventEnd ? 3 : 0}px ${isEventEnd ? 3 : 0}px ${isEventStart ? 3 : 0}px;
          `;

          // Show label on event start and on week-row continuations
          bar.textContent = (isEventStart || !isEventStart) ? evt.title : '';

          bar.addEventListener('click', (e) => {
            e.stopPropagation();
            handleEventClick(evt._templateId || evt.id);
          });

          grid.appendChild(bar);
        }
      }
    }

    // Re-layout overlays on resize
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (Store.data) renderMultiDayOverlays();
      }, 150);
    });

    // ---- INIT ----
    initMonth();
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await Store.init();
        renderPage();

        // Load meal data for this month (non-blocking, re-renders when done)
        loadMealsForMonth(currentYear, currentMonth).then(() => renderPage());
      } catch (err) {
        document.getElementById('app').innerHTML =
          `<div class="error-state"><h2>Cannot reach the server</h2><p>${err.message}</p></div>`;
      }
    });

    document.getElementById('event-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
